<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作報告 · Monthly Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --fg: #000000;
  --muted: #f5f5f5;
  --muted-fg: #525252;
  --border-light: #e5e5e5;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Serif 4', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--fg);
  line-height: 1.625; max-width: 960px; margin: 0 auto;
  padding: 48px 24px; font-size: 16px;
}

/* Header */
.site-head { padding: 24px 0 28px; border-bottom: 4px solid var(--fg); margin-bottom: 32px; }
.kicker { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.12em; }
h1 { font-family: var(--font-display); font-size: 3rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; margin: 10px 0 8px; }
.site-sub { font-size: 1.02rem; color: var(--muted-fg); max-width: 640px; }

/* Section label */
.section-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.12em; margin: 8px 0 4px; }

/* Report cards grid */
.report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0; margin: 12px 0 32px; }
.report-card {
  display: block; padding: 24px; background: var(--bg);
  border: 1px solid var(--fg); margin: -0.5px;
  text-decoration: none; color: inherit;
  transition: background 0.12s ease;
}
.report-card:hover { background: var(--muted); }
.report-card:hover .card-cta { letter-spacing: 0.04em; }
.card-period { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.1em; }
.card-month { font-family: var(--font-display); font-size: 2.6rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; margin: 2px 0 6px; font-variant-numeric: tabular-nums; }
.card-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
.card-summary { font-size: 0.88rem; color: var(--muted-fg); line-height: 1.55; margin-bottom: 14px; }
.card-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.status { display: inline-flex; align-items: center; padding: 2px 8px; font-family: var(--font-mono); font-size: 0.66rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; border: 1px solid var(--border-light); }
.status-green { color: var(--muted-fg); border-color: var(--border-light); }
.status-red { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.card-cta { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.02em; transition: letter-spacing 0.12s ease; }

/* Upcoming placeholder */
.report-card.upcoming { border-style: dashed; border-color: var(--border-light); cursor: default; }
.report-card.upcoming:hover { background: var(--bg); }
.report-card.upcoming .card-month, .report-card.upcoming .card-title { color: var(--border-light); }
.report-card.upcoming .card-summary { color: var(--border-light); }

footer { border-top: 4px solid var(--fg); margin-top: 8px; padding-top: 16px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.08em; }

@media (max-width: 640px) {
  h1 { font-size: 2.1rem; }
  .report-grid { grid-template-columns: 1fr; }
  body { padding: 32px 18px; }
}
</style>
</head>
<body>

<header class="site-head">
  <p class="kicker">Monthly Reports</p>
  <h1>工作報告</h1>
  <p class="site-sub">每月工程與專案進度的回顧報告，涵蓋基礎設施、前端、本地應用與平台工程。點選月份卡片進入該月完整報告。</p>
</header>

<p class="section-label">2026</p>
<div class="report-grid">

  <!--
    加新月份的方法：
    1. 建立資料夾 ./YYYY-MM/ 並放入該月報告 index.html（self-contained、CSS 內嵌）
    2. 複製下面整個 <a class="report-card"> 區塊，改：card-period / card-month / card-title / card-summary / badges / href="./YYYY-MM/"
    3. 最新月份放在最前面（grid 由上而下、由左至右）
    4. 跨年時在上方新增一個 <p class="section-label">YYYY</p> 區隔
  -->

  <a href="./2026-05/" class="report-card">
    <div class="card-period">2026-05-01 — 05-31</div>
    <div class="card-month">05</div>
    <div class="card-title">五月工作報告</div>
    <div class="card-summary">ECS → EKS 100% 遷移完成、ARC self-hosted CI、四個本地應用（VIM / LMC / ETC / LLB）、前端功能與效能修復，以及一輪知識系統重整。</div>
    <div class="card-badges">
      <span class="status status-red">ECS→EKS 100%</span>
      <span class="status status-red">3AZ Cutover</span>
      <span class="status status-green">14 領域</span>
    </div>
    <div class="card-cta">閱讀報告 →</div>
  </a>

  <!-- 下一份報告（六月）就緒後，把這張 upcoming 佔位卡換成正式卡片 -->
  <div class="report-card upcoming">
    <div class="card-period">即將推出</div>
    <div class="card-month">06</div>
    <div class="card-title">六月工作報告</div>
    <div class="card-summary">月底彙整後上線。</div>
  </div>

</div>

<footer>
  Monthly Reports · 建立於 2026
</footer>

</body>
</html>
